apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: appointment-service
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          envFrom:
            - secretRef:
                name: appointment-service-secret